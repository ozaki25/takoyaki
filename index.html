<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>たこ焼き具材ガチャ</title>
  <meta name="description" content="穴をクリックして焼き加減を進める、たこ焼き具材ガチャゲーム" />
  <meta name="theme-color" content="#D5803B" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <style>
    :root{
      --bg:#fff7ea;
      --panel:#ffffff;
      --ink:#2C2C2B;
      --muted:#656158;
      --line:#E6E5E3;
      --accent:#A85A22;
      --accent2:#2783DE;
      --good:#2f7d54;
      --bad:#E56458;
      --rare:#8d5ce6;
      --legend:#f0b24a;
      --shadow:0 2px 4px rgba(80,48,18,.08),0 14px 34px rgba(80,48,18,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      touch-action:manipulation;
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,218,137,.55), transparent 32%),
        radial-gradient(circle at 82% 18%, rgba(229,242,252,.9), transparent 28%),
        linear-gradient(135deg,#fffaf2 0%,var(--bg) 100%);
      display:flex;
      justify-content:center;
      padding:18px;
    }
    .app{
      width:min(1080px,100%);
      display:grid;
      grid-template-columns: 1.25fr .75fr;
      gap:18px;
      align-items:start;
    }
    header{
      grid-column:1/-1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      background:rgba(255,255,255,.74);
      border:1px solid rgba(230,229,227,.85);
      border-radius:18px;
      padding:14px 18px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(8px);
    }
    h1{font-size:clamp(22px,3vw,34px);line-height:1.05;margin:0;letter-spacing:.02em}
    .subtitle{color:var(--muted);font-size:14px;margin-top:6px}
    .stats{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .pill{
      min-width:86px;
      padding:8px 12px;
      border-radius:14px;
      background:#fff;
      border:1px solid var(--line);
      text-align:center;
    }
    .pill b{display:block;font-size:20px;line-height:1.1}
    .pill span{font-size:12px;color:var(--muted)}
    .board-wrap,.side{
      background:rgba(255,255,255,.82);
      border:1px solid rgba(230,229,227,.9);
      border-radius:22px;
      box-shadow:var(--shadow);
    }
    .board-wrap{padding:18px}
    .machine{
      position:relative;
      border-radius:28px;
      padding:22px;
      background:
        linear-gradient(145deg,#393939,#1f1f1f);
      box-shadow: inset 0 0 0 8px #58524b, inset 0 -16px 30px rgba(0,0,0,.35);
    }
    .griddle{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
    }
    .hole{
      aspect-ratio:1;
      min-height:96px;
      border:0;
      border-radius:50%;
      cursor:pointer;
      touch-action:manipulation;
      position:relative;
      background:radial-gradient(circle at 50% 58%,#151515 0 52%,#090909 53% 63%,#5c5750 64% 100%);
      box-shadow:inset 0 6px 14px rgba(0,0,0,.8),0 2px 0 rgba(255,255,255,.12);
      transition:transform .12s ease, filter .2s ease;
    }
    .hole:hover{transform:translateY(-2px)}
    .hole:focus-visible{outline:3px solid var(--accent2);outline-offset:4px}
    .float-layer{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:6;border-radius:28px}
    .stage-banner{
      position:absolute;inset:0;
      display:none;
      align-items:center;justify-content:center;
      flex-direction:column;
      gap:10px;
      text-align:center;
      padding:24px;
      background:rgba(15,12,9,.95);
      border-radius:28px;
      z-index:15;
    }
    .stage-banner.show{display:flex}
    .stage-banner .title{
      font-size:clamp(28px,6vw,44px);
      font-weight:900;
      color:#fff8e6;
      text-shadow:0 4px 12px rgba(0,0,0,.5);
      animation:bannerPop .7s cubic-bezier(.2,1.4,.4,1) both;
    }
    .stage-banner .sub{
      font-size:15px;
      color:#fff8e6;
      opacity:.9;
      animation:bannerFade .5s ease .15s both;
    }
    .stage-banner .result-score{
      font-size:clamp(36px,8vw,56px);
      font-weight:900;
      color:#ffd873;
      text-shadow:0 4px 14px rgba(0,0,0,.5);
      animation:bannerPop .7s cubic-bezier(.2,1.4,.4,1) both;
    }
    .stage-banner .chips{
      display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:320px;
    }
    .stage-banner .chip{
      font-size:22px;
      background:rgba(255,255,255,.14);
      border-radius:12px;
      padding:6px 8px;
      animation:chipPop .45s cubic-bezier(.2,1.4,.4,1) both;
    }
    .stage-banner .chip.star{
      font-size:30px;
      background:rgba(255,216,115,.25);
      box-shadow:0 0 18px rgba(255,216,115,.6);
    }
    .stage-banner .banner-share{
      margin-top:2px;
      min-height:44px;
      padding:0 24px;
      border:0;
      border-radius:14px;
      background:var(--accent);
      color:#fff;
      font-weight:800;
      font-size:15px;
      cursor:pointer;
      touch-action:manipulation;
      box-shadow:0 8px 16px rgba(0,0,0,.3);
    }
    @keyframes bannerPop{
      0%{opacity:0;transform:scale(.6)}
      60%{opacity:1;transform:scale(1.08)}
      100%{opacity:1;transform:scale(1)}
    }
    @keyframes bannerFade{from{opacity:0}to{opacity:.9}}
    @keyframes chipPop{
      0%{opacity:0;transform:scale(.3) translateY(10px)}
      70%{opacity:1;transform:scale(1.15) translateY(0)}
      100%{opacity:1;transform:scale(1) translateY(0)}
    }
    .float-score{
      position:absolute;
      transform:translate(-50%,-50%);
      font-weight:900;
      font-size:22px;
      color:#fff8e6;
      text-shadow:0 2px 6px rgba(0,0,0,.55);
      white-space:nowrap;
      animation:floatUp .9s ease-out forwards;
    }
    .float-score.neg{color:#ff9d8a}
    .float-score.rare{color:#c9a6ff}
    .float-score.super{color:#7fc4ff}
    .float-score.legendary{color:var(--legend);text-shadow:0 2px 6px rgba(0,0,0,.55),0 0 14px rgba(240,178,74,.85)}
    .float-score.combo{font-size:27px;text-shadow:0 2px 6px rgba(0,0,0,.55),0 0 16px rgba(255,224,140,.9)}
    @keyframes floatUp{
      0%{opacity:0;transform:translate(-50%,-40%) scale(.7)}
      15%{opacity:1;transform:translate(-50%,-70%) scale(1.15)}
      100%{opacity:0;transform:translate(-50%,-190%) scale(1)}
    }
    .machine.combo-flash{--flash-color:255,210,110;animation:machineFlash .5s ease-out}
    .machine.danger-flash{--flash-color:210,64,48;animation:machineFlash .55s ease-out}
    @keyframes machineFlash{
      0%{box-shadow:inset 0 0 0 8px #58524b, inset 0 -16px 30px rgba(0,0,0,.35), 0 0 0 0 rgba(var(--flash-color),.85)}
      100%{box-shadow:inset 0 0 0 8px #58524b, inset 0 -16px 30px rgba(0,0,0,.35), 0 0 48px 15px rgba(var(--flash-color),0)}
    }
    .hole.warn{animation:holeWarn .6s ease-in-out infinite}
    @keyframes holeWarn{
      0%,100%{box-shadow:inset 0 6px 14px rgba(0,0,0,.8),0 2px 0 rgba(255,255,255,.12), 0 0 0 0 rgba(224,90,50,.75)}
      50%{box-shadow:inset 0 6px 14px rgba(0,0,0,.8),0 2px 0 rgba(255,255,255,.12), 0 0 0 5px rgba(224,90,50,0)}
    }
    .particle{
      position:absolute;
      width:8px;height:8px;
      border-radius:50%;
      left:50%;top:50%;
      transform:translate(-50%,-50%);
      animation:particleFly .6s ease-out forwards;
    }
    @keyframes particleFly{
      0%{opacity:1;transform:translate(-50%,-50%) scale(1)}
      100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.3)}
    }
    .particle.spark{background:radial-gradient(circle,#fff6d6,#f0b24a)}
    .particle.smoke{background:#9c9892;opacity:.85;width:9px;height:9px}
    .particle.ash{background:#3a3630;width:11px;height:11px;animation-duration:.75s}
    .pill b{transition:transform .15s ease, color .15s ease}
    .pill b.pulse{color:var(--accent);transform:scale(1.15)}
    .ball{
      width:78%;
      height:78%;
      border-radius:50%;
      position:absolute;
      left:11%;
      top:11%;
      display:grid;
      place-items:center;
      text-align:center;
      padding:8px;
      font-weight:800;
      color:#5b3312;
      line-height:1.15;
      text-shadow:0 1px 0 rgba(255,255,255,.45);
      background:
        radial-gradient(circle at 34% 24%,rgba(255,255,255,.85),transparent 18%),
        radial-gradient(circle at 60% 62%,rgba(190,96,22,.16),transparent 38%),
        #ffd995;
      box-shadow:inset -8px -10px 18px rgba(165,78,13,.16), inset 6px 8px 15px rgba(255,255,255,.55), 0 3px 10px rgba(0,0,0,.35);
      transform:scale(.9);
      animation:pop .22s ease-out;
      transition:background .35s ease, color .3s ease;
      overflow:hidden;
    }
    @keyframes pop{from{transform:scale(.55);opacity:.25}to{transform:scale(.9);opacity:1}}
    .ball .emoji{display:block;font-size:27px;margin-bottom:2px}
    .ball .name{font-size:12px}
    .ball.raw{filter:saturate(.78);background:#f4d9ad}
    .ball.ready{background:
        radial-gradient(circle at 34% 24%,rgba(255,255,255,.82),transparent 15%),
        radial-gradient(circle at 63% 68%,rgba(154,81,25,.3),transparent 36%),
        #f0b45f}
    .ball.perfect{background:
        radial-gradient(circle at 32% 23%,rgba(255,255,255,.75),transparent 14%),
        radial-gradient(circle at 65% 70%,rgba(96,50,18,.38),transparent 40%),
        #d98a38;color:#4a2a0f;text-shadow:0 1px 0 rgba(255,255,255,.45)}
    .ball.burnt{background:#29211c;color:#f6d0a2;text-shadow:none}
    .ball.rare::after,.ball.legendary::after{
      content:"";
      position:absolute;inset:-18%;
      background:conic-gradient(from 0deg,transparent,rgba(141,92,230,.34),transparent,rgba(39,131,222,.26),transparent);
      animation:spin 2.4s linear infinite;
      z-index:-1;
    }
    .ball.legendary::after{background:conic-gradient(from 0deg,transparent,rgba(234,194,107,.65),transparent,rgba(255,255,255,.4),transparent)}
    @keyframes spin{to{transform:rotate(1turn)}}
    .status{
      margin-top:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      color:#f9f8f7;
      font-size:14px;
    }
    .heatbar{
      flex:1;height:12px;border-radius:99px;background:#191919;overflow:hidden;border:1px solid rgba(255,255,255,.16)
    }
    .heatbar i{display:block;height:100%;width:35%;background:linear-gradient(90deg,#46A171,#EAC26B,#E56458);border-radius:inherit;transition:width .2s}
    .tray-wrap{display:flex;align-items:center;gap:8px;margin-top:10px;min-height:26px}
    .tray-label{font-size:11px;color:#c9c6c1;flex:none}
    .tray{display:flex;align-items:center;gap:5px;flex-wrap:wrap;min-height:24px}
    .tray-chip{
      width:22px;height:22px;border-radius:50%;
      background:rgba(255,255,255,.12);
      display:flex;align-items:center;justify-content:center;
      font-size:13px;
      animation:chipPop .4s cubic-bezier(.2,1.4,.4,1) both;
    }
    .tray-chip.overflow{
      width:auto;min-width:22px;padding:0 7px;border-radius:11px;
      background:rgba(255,216,115,.22);color:#ffd873;font-weight:800;font-size:11px;
    }
    .tray-chip.overflow.bump{animation:chipPop .3s ease}
    .tray-fly{
      position:absolute;
      font-size:20px;
      transform:translate(-50%,-50%);
      z-index:8;
      pointer-events:none;
      opacity:1;
      transition:left .5s cubic-bezier(.3,.5,.3,1), top .5s cubic-bezier(.3,.5,.3,1), opacity .5s ease .22s, font-size .5s ease;
    }
    .side{padding:18px;display:grid;gap:14px}
    .card{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:14px;
    }
    .card h2{font-size:17px;margin:0 0 10px}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    button.action{
      min-height:48px;
      border:0;
      border-radius:14px;
      color:white;
      font-weight:800;
      font-size:15px;
      cursor:pointer;
      touch-action:manipulation;
      background:var(--accent);
      box-shadow:0 8px 16px rgba(168,90,34,.28);
    }
    button.secondary{background:#2C2C2B;box-shadow:none}
    button.action:hover{filter:brightness(1.03);transform:translateY(-1px)}
    button.action:active{transform:translateY(0)}
    .guide{font-size:14px;color:var(--muted);line-height:1.55;margin:0}
    .collection{
      display:grid;
      gap:8px;
      max-height:218px;
      overflow:auto;
      padding-right:4px;
    }
    .ingredient{
      display:grid;
      grid-template-columns:auto 1fr auto auto;
      gap:8px;
      align-items:center;
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px 10px;
      background:#F9F8F7;
      font-size:13px;
    }
    .ingredient.undiscovered{opacity:.55;filter:grayscale(1)}
    .dex-count{font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap}
    .new-flag{
      display:inline-block;
      background:var(--bad);color:#fff;
      font-size:9px;font-weight:800;
      border-radius:6px;padding:1px 5px;margin-left:6px;
      vertical-align:middle;
    }
    .rarity{font-size:11px;border-radius:999px;padding:2px 8px;background:#E5F2FC;color:#1b5e9f;font-weight:700}
    .rarity.rare{background:#efe9fb;color:#6e42bd}
    .rarity.legendary{background:#fff1c8;color:#8a5a00}
    .rarity.unknown{background:#e8e6e3;color:#8a8783}
    .dex-btn{width:100%;margin-top:10px}
    .dex-modal{
      position:fixed;inset:0;
      background:rgba(20,16,12,.55);
      display:flex;align-items:center;justify-content:center;
      z-index:40;
      padding:16px;
    }
    .dex-modal[hidden]{display:none}
    .dex-panel{
      background:#fff;
      border-radius:20px;
      box-shadow:var(--shadow);
      width:min(440px,100%);
      max-height:min(640px,88vh);
      display:flex;flex-direction:column;
      padding:16px;
    }
    .dex-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .dex-head h2{margin:0;font-size:17px}
    .dex-close{
      border:0;background:#F1EFEC;border-radius:50%;
      width:34px;height:34px;font-size:17px;font-weight:700;
      cursor:pointer;touch-action:manipulation;color:var(--ink);
    }
    .dex-list{max-height:none;flex:1;overflow:auto}
    .discovery-overlay{
      position:fixed;inset:0;
      background:rgba(15,12,9,.94);
      z-index:50;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:14px;text-align:center;
      cursor:pointer;
      padding:24px;
    }
    .discovery-overlay[hidden]{display:none}
    .discovery-overlay .d-label{
      color:#ffd873;font-weight:900;
      font-size:clamp(24px,6vw,36px);
      text-shadow:0 0 18px rgba(255,216,115,.6);
      animation:bannerPop .6s cubic-bezier(.2,1.4,.4,1) both;
    }
    .discovery-overlay .d-emoji{
      font-size:clamp(80px,22vw,130px);
      line-height:1.1;
      animation:discoverySpin .9s cubic-bezier(.2,1.2,.3,1) both;
      filter:drop-shadow(0 0 28px rgba(255,216,115,.6));
    }
    .discovery-overlay.rare .d-emoji{filter:drop-shadow(0 0 28px rgba(141,92,230,.8))}
    .discovery-overlay.super .d-emoji{filter:drop-shadow(0 0 28px rgba(39,131,222,.8))}
    .discovery-overlay .d-name{
      color:#fff8e6;font-weight:800;
      font-size:clamp(22px,5vw,30px);
      animation:bannerFade .5s ease .2s both;
    }
    .discovery-overlay .d-name .rarity{margin-left:8px;vertical-align:middle}
    .discovery-overlay .d-registered{color:#fff8e6;opacity:.85;font-size:15px;animation:bannerFade .5s ease .35s both}
    .discovery-overlay .d-hint{color:#fff8e6;opacity:.6;font-size:12px;animation:bannerFade .5s ease .6s both}
    @keyframes discoverySpin{
      0%{opacity:0;transform:scale(.2) rotate(-30deg)}
      60%{opacity:1;transform:scale(1.18) rotate(6deg)}
      100%{opacity:1;transform:scale(1) rotate(0)}
    }
    .toast{
      min-height:48px;
      border-radius:14px;
      padding:12px 14px;
      background:#FBEBDE;
      color:#7a4213;
      font-weight:700;
      line-height:1.35;
    }
    .combo{color:var(--good);font-weight:900}
    .small{font-size:12px;color:var(--muted);margin-top:8px}
    .ranking{list-style:none;margin:0;padding:0;display:grid;gap:8px;max-height:280px;overflow:auto;padding-right:4px}
    .ranking li{
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:10px;
      align-items:center;
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px 10px;
      background:#F9F8F7;
      font-size:13px;
    }
    .ranking li.new{border-color:var(--accent);background:#FBEBDE}
    .ranking li.ranking-empty{border:none;background:none;color:var(--muted);grid-template-columns:1fr}
    .rank-badge{
      width:24px;height:24px;border-radius:50%;
      background:#dcdad6;color:#2C2C2B;font-weight:800;font-size:12px;
      display:grid;place-items:center;flex:none;
    }
    .rank-badge.gold{background:linear-gradient(145deg,#ffdd8a,#c98a2e);color:#5b3312}
    .rank-badge.silver{background:linear-gradient(145deg,#e6e8ea,#a9b0b6);color:#2C2C2B}
    .rank-badge.bronze{background:linear-gradient(145deg,#c9906a,#6e3d24);color:#fff}
    .ranking .score{font-weight:800}
    .ranking .meta{color:var(--muted);font-size:11px;margin-left:6px;font-weight:400}
    @media(max-width:820px){
      body{padding:12px}
      .app{grid-template-columns:1fr}
      .side{order:1}
      .ranking-card{order:2}
      header{align-items:flex-start;flex-direction:column}
      .stats{justify-content:flex-start;flex-wrap:nowrap;gap:6px;width:100%}
      .pill{min-width:0;flex:1;padding:6px 4px}
      .pill b{font-size:15px}
      .pill span{font-size:9.5px;white-space:nowrap}
      .griddle{gap:10px}
      .hole{min-height:56px}
      .ball{padding:5px}
      .ball .emoji{font-size:20px;margin-bottom:1px}
      .ball .name{font-size:10px;line-height:1.05}
      body{padding-bottom:88px}
      .actions{
        position:fixed;
        left:0;right:0;bottom:0;
        margin:0;
        grid-template-columns:1fr 1fr;
        gap:10px;
        padding:10px 12px calc(10px + env(safe-area-inset-bottom));
        background:rgba(255,250,242,.94);
        backdrop-filter:blur(10px);
        border-top:1px solid var(--line);
        box-shadow:0 -8px 24px rgba(80,48,18,.14);
        z-index:20;
      }
      .controls-card{padding:0;border:none;background:none;box-shadow:none}
      .controls-card h2, .controls-card .guide{display:none}
    }
    @media(max-width:480px){
      .griddle{grid-template-columns:repeat(3,1fr);gap:8px}
      .ball{padding:4px}
      .ball .emoji{font-size:19px}
      .ball .name{font-size:9.5px}
    }
    @media(min-width:821px){
      .ranking-card{grid-column:1}
      .side{grid-column:2;grid-row:2 / span 2}
    }
    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{animation:none!important;transition:none!important}
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>たこ焼き具材ガチャ</h1>
        <div class="subtitle">穴をクリックして焼き加減を進めよう。こんがり〜完璧で回収！レベルアップでレア具材が解放されます。</div>
      </div>
      <div class="stats" aria-label="ゲーム状況">
        <div class="pill"><b id="level">1</b><span>レベル</span></div>
        <div class="pill"><b id="score">0</b><span>スコア</span></div>
        <div class="pill"><b id="coins">0</b><span>まんぷくP</span></div>
        <div class="pill"><b id="timer">60</b><span>秒</span></div>
      </div>
    </header>

    <section class="board-wrap" aria-label="たこ焼き鉄板">
      <div class="machine">
        <div class="griddle" id="griddle"></div>
        <div class="float-layer" id="floatLayer" aria-hidden="true"></div>
        <div class="stage-banner" id="stageBanner"></div>
        <div class="status">
          <span id="heatLabel">火力：ふつう</span>
          <div class="heatbar" aria-hidden="true"><i id="heatBar"></i></div>
          <span id="queue">具材待ち</span>
        </div>
        <div class="tray-wrap">
          <span class="tray-label">できたて</span>
          <div class="tray" id="tray" aria-hidden="true"></div>
        </div>
      </div>
    </section>

    <section class="card ranking-card">
      <h2>ランキング(トップ10)</h2>
      <ol class="ranking" id="ranking"></ol>
    </section>

    <aside class="side">
      <section class="card controls-card">
        <h2>操作</h2>
        <div class="actions">
          <button class="action" id="startBtn">スタート</button>
          <button class="action secondary" id="boostBtn">火力UP</button>
        </div>
        <p class="guide">クリック1回目で生地投入、2回目でくるっと回転、3回目以降は焼き加減に応じて回収。放置しすぎると焦げます。</p>
      </section>

      <section class="card">
        <h2>今日の屋台メモ</h2>
        <div class="toast" id="message">スタートを押して、変わり種たこ焼きを焼こう！</div>
        <div class="small">レベル2: レア具材 / レベル4: 激レア具材 / レベル6: 伝説具材</div>
      </section>

      <section class="card">
        <h2>今回見つけた具材</h2>
        <div class="collection" id="collection"></div>
        <button class="action secondary dex-btn" id="dexBtn">具材図鑑を見る</button>
      </section>
    </aside>
  </main>

  <div class="dex-modal" id="dexModal" hidden>
    <div class="dex-panel">
      <div class="dex-head">
        <h2>具材図鑑(<span id="dexProgress">0/14</span>)</h2>
        <button class="dex-close" id="dexClose" aria-label="図鑑を閉じる">×</button>
      </div>
      <div class="collection dex-list" id="dexList"></div>
    </div>
  </div>

  <div class="discovery-overlay" id="discoveryOverlay" hidden></div>

<script>
(() => {
  // speed: 基礎の焼け速さ(1.0が基準)。heatFactor: 火力を上げた時にどれだけ余計に速く進むか(1.0が基準)。
  // perfectWindow: 完璧の期間の広さ(1.0が基準、大きいほど粘り焦げにくい、小さいほど一瞬で焦げる)
  // 得点が高い(レアな)具材ほど焼くのが難しくなるよう、得点と相関させて調整している
  const ingredients = [
    {name:"タコ",     emoji:"🐙", rarity:"normal",    unlock:1, points:12,  speed:1.00, heatFactor:1.00, perfectWindow:1.15},
    {name:"ねぎ",     emoji:"🌿", rarity:"normal",    unlock:1, points:12,  speed:1.02, heatFactor:1.05, perfectWindow:1.05},
    {name:"チーズ",   emoji:"🧀", rarity:"normal",    unlock:1, points:13,  speed:1.08, heatFactor:1.10, perfectWindow:1.00},
    {name:"もち",     emoji:"🍡", rarity:"normal",    unlock:1, points:14,  speed:1.05, heatFactor:0.95, perfectWindow:1.10},
    {name:"明太子",   emoji:"🔴", rarity:"normal",    unlock:1, points:15,  speed:1.12, heatFactor:1.12, perfectWindow:0.90},
    {name:"キムチ",   emoji:"🌶️", rarity:"rare",      unlock:2, points:24,  speed:1.05, heatFactor:1.15, perfectWindow:1.00},
    {name:"えび",     emoji:"🦐", rarity:"rare",      unlock:2, points:26,  speed:1.12, heatFactor:1.15, perfectWindow:0.90},
    {name:"アボカド", emoji:"🥑", rarity:"rare",      unlock:3, points:28,  speed:1.10, heatFactor:1.05, perfectWindow:0.95},
    {name:"牛すじ",   emoji:"🍖", rarity:"rare",      unlock:3, points:30,  speed:1.15, heatFactor:1.20, perfectWindow:0.80},
    {name:"いくら",   emoji:"🟠", rarity:"super",     unlock:4, points:44,  speed:1.25, heatFactor:1.35, perfectWindow:0.60},
    {name:"トリュフ", emoji:"🍄", rarity:"super",     unlock:4, points:50,  speed:1.22, heatFactor:1.35, perfectWindow:0.65},
    {name:"うなぎ",   emoji:"🍱", rarity:"super",     unlock:5, points:56,  speed:1.30, heatFactor:1.40, perfectWindow:0.55},
    {name:"金のタコ", emoji:"✨", rarity:"legendary", unlock:6, points:95,  speed:1.30, heatFactor:1.45, perfectWindow:0.50},
    {name:"宇宙タコ", emoji:"🛸", rarity:"legendary", unlock:7, points:120, speed:1.40, heatFactor:1.55, perfectWindow:0.40}
  ];
  const RARITY = {
    normal:    { label:"定番",   weight:18, badgeCls:"",          rank:0 },
    rare:      { label:"レア",   weight:7,  badgeCls:"rare",      rank:1 },
    super:     { label:"激レア", weight:3,  badgeCls:"rare",      rank:2 },
    legendary: { label:"伝説",   weight:1,  badgeCls:"legendary", rank:3 }
  };
  const HOLE_COUNT = 12;
  const HEAT_LEVELS = [
    { value:1,    label:"ふつう", barWidth:35 },
    { value:1.6,  label:"強め",   barWidth:68 },
    { value:2.15, label:"全開",   barWidth:100 }
  ];
  const STAGE_RAW_MAX = 2;
  const STAGE_READY_MAX = 4;
  const STAGE_PERFECT_MAX = 6;
  const RAW_PENALTY = -5;
  const BURNT_PENALTY = -12;
  const NEGLECT_AGE = 15;
  const NEGLECT_WARN_AGE = NEGLECT_AGE - 4;
  const NEGLECT_PENALTY = 20;
  const LEVEL_SCORE_STEP = 180;
  const TRAY_VISIBLE_CAP = 30;
  const HIGHSCORE_KEY = "takoyakiGachaHighScores";
  const DEX_KEY = "takoyakiGachaDex";

  function loadDex(){
    try{
      const dex = JSON.parse(localStorage.getItem(DEX_KEY) || "{}");
      return dex && typeof dex === "object" && !Array.isArray(dex) ? dex : {};
    }catch(e){ return {}; }
  }

  const state = {
    running:false, level:1, score:0, coins:0, time:60, heat:HEAT_LEVELS[0].value,
    holes:[], seen:new Set(), combo:0, tick:null, lastResult:null, newFinds:[]
  };
  const ui = {
    scoreAnimCurrent:0, scoreRAF:null,
    trayOverflowCount:0, bannerTimer:null,
    restartArmed:false, restartArmTimer:null,
    dex:loadDex(), newDiscoveries:new Set(), discoveryQueue:[]
  };

  function saveDex(){
    try{ localStorage.setItem(DEX_KEY, JSON.stringify(ui.dex)); }catch(e){}
  }
  function recordDiscovery(ing){
    if(ui.dex[ing.name]) return;
    ui.dex[ing.name] = { collected: 0, first: new Date().toISOString() };
    ui.newDiscoveries.add(ing.name);
    saveDex();
    if(ing.rarity !== "normal") state.newFinds.push(ing);
  }
  function recordCollected(name){
    if(!ui.dex[name]) ui.dex[name] = { collected: 0, first: new Date().toISOString() };
    ui.dex[name].collected += 1;
    saveDex();
  }
  function showNextDiscovery(){
    const overlay = $("discoveryOverlay");
    const ing = ui.discoveryQueue.shift();
    if(!ing){
      overlay.hidden = true;
      return;
    }
    overlay.className = "discovery-overlay " + ing.rarity;
    overlay.innerHTML = `
      <div class="d-label">✨ 新発見！ ✨</div>
      <div class="d-emoji">${ing.emoji}</div>
      <div class="d-name">${ing.name}<span class="rarity ${RARITY[ing.rarity].badgeCls}">${RARITY[ing.rarity].label}</span></div>
      <div class="d-registered">具材図鑑に登録された！</div>
      <div class="d-hint">タップで${ui.discoveryQueue.length ? "次へ" : "閉じる"}</div>`;
    overlay.hidden = false;
    vibrate([20, 60, 20, 60, 40]);
  }
  function celebrateNewFinds(finds){
    if(!finds.length) return;
    ui.discoveryQueue = finds.slice();
    showNextDiscovery();
  }

  const $ = id => document.getElementById(id);
  const griddle = $("griddle");
  const floatLayer = $("floatLayer");
  const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function createHoles(){
    return Array.from({length:HOLE_COUNT}, () => ({ ball:null, age:0, flipped:false }));
  }
  function holeCenterInLayer(index){
    const holeEl = griddle.children[index];
    if(!holeEl || !floatLayer) return null;
    const holeRect = holeEl.getBoundingClientRect();
    const layerRect = floatLayer.getBoundingClientRect();
    return {
      x: holeRect.left - layerRect.left + holeRect.width / 2,
      y: holeRect.top - layerRect.top + holeRect.height / 2,
      top: holeRect.top - layerRect.top,
      height: holeRect.height
    };
  }
  function currentHeatLevel(){
    return HEAT_LEVELS.find(h => h.value === state.heat) || HEAT_LEVELS[0];
  }
  const BASE_COOK_RATE = 0.72;
  function cookRate(ball, heat){
    return BASE_COOK_RATE * ball.speed * (1 + (heat - 1) * ball.heatFactor);
  }

  function animateScoreTo(target){
    const scoreEl = $("score");
    if(ui.scoreAnimCurrent === target) return;
    if(prefersReducedMotion){
      ui.scoreAnimCurrent = target;
      scoreEl.textContent = target;
      return;
    }
    const start = ui.scoreAnimCurrent;
    const startTime = performance.now();
    const duration = Math.min(600, 150 + Math.abs(target - start) * 4);
    scoreEl.classList.add("pulse");
    cancelAnimationFrame(ui.scoreRAF);
    function step(now){
      const t = Math.min(1, (now - startTime) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      ui.scoreAnimCurrent = Math.round(start + (target - start) * eased);
      scoreEl.textContent = ui.scoreAnimCurrent;
      if(t < 1){
        ui.scoreRAF = requestAnimationFrame(step);
      }else{
        ui.scoreAnimCurrent = target;
        scoreEl.textContent = target;
        scoreEl.classList.remove("pulse");
      }
    }
    ui.scoreRAF = requestAnimationFrame(step);
  }
  function showFloatScore(index, amount, rarity, combo){
    const c = holeCenterInLayer(index);
    if(!c) return;
    const el = document.createElement("div");
    const rarityCls = amount > 0 && rarity && rarity !== "normal" ? " " + rarity : "";
    el.className = "float-score" + (amount < 0 ? " neg" : rarityCls) + (combo > 1 && amount > 0 ? " combo" : "");
    el.textContent = (amount > 0 ? "+" : "") + amount + "点";
    el.style.left = c.x + "px";
    el.style.top = (c.top + c.height * 0.3) + "px";
    floatLayer.appendChild(el);
    el.addEventListener("animationend", () => el.remove());
    setTimeout(() => el.remove(), 950);
  }
  function flashMachine(cls){
    const machine = document.querySelector(".machine");
    if(!machine) return;
    machine.classList.remove(cls);
    void machine.offsetWidth;
    machine.classList.add(cls);
  }
  function spawnParticles(index, count, kind){
    const c = holeCenterInLayer(index);
    if(!c) return;
    for(let i = 0; i < count; i++){
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
      const dist = 22 + Math.random() * 22;
      const p = document.createElement("div");
      p.className = "particle " + kind;
      p.style.left = c.x + "px";
      p.style.top = c.y + "px";
      p.style.setProperty("--dx", Math.cos(angle) * dist + "px");
      p.style.setProperty("--dy", Math.sin(angle) * dist + "px");
      floatLayer.appendChild(p);
      p.addEventListener("animationend", () => p.remove());
      setTimeout(() => p.remove(), 800);
    }
  }
  function resetTray(){
    ui.trayOverflowCount = 0;
    const trayEl = $("tray");
    if(trayEl) trayEl.innerHTML = "";
  }
  function updateOverflowBadge(){
    const trayEl = $("tray");
    if(!trayEl) return;
    let badge = trayEl.querySelector(".tray-chip.overflow");
    if(!badge){
      badge = document.createElement("span");
      badge.className = "tray-chip overflow";
      trayEl.prepend(badge);
    }
    badge.textContent = "+" + ui.trayOverflowCount;
    badge.classList.remove("bump");
    void badge.offsetWidth;
    badge.classList.add("bump");
  }
  function commitTrayItem(emoji){
    const trayEl = $("tray");
    if(!trayEl) return;
    const chip = document.createElement("span");
    chip.className = "tray-chip";
    chip.textContent = emoji;
    trayEl.appendChild(chip);
    const chips = trayEl.querySelectorAll(".tray-chip:not(.overflow)");
    if(chips.length > TRAY_VISIBLE_CAP - 1){
      chips[0].remove();
      ui.trayOverflowCount++;
      updateOverflowBadge();
    }
  }
  function flyToTray(index, emoji){
    const trayEl = $("tray");
    const c = holeCenterInLayer(index);
    if(!c || !trayEl || prefersReducedMotion){
      commitTrayItem(emoji);
      return;
    }
    const layerRect = floatLayer.getBoundingClientRect();
    const trayRect = trayEl.getBoundingClientRect();
    const fly = document.createElement("div");
    fly.className = "tray-fly";
    fly.textContent = emoji;
    fly.style.left = c.x + "px";
    fly.style.top = c.y + "px";
    floatLayer.appendChild(fly);
    requestAnimationFrame(() => {
      fly.style.left = (trayRect.right - layerRect.left - 10) + "px";
      fly.style.top = (trayRect.top - layerRect.top + trayRect.height / 2) + "px";
      fly.style.fontSize = "10px";
      fly.style.opacity = "0.3";
    });
    let cleaned = false;
    const cleanup = () => {
      if(cleaned) return;
      cleaned = true;
      fly.remove();
      commitTrayItem(emoji);
    };
    fly.addEventListener("transitionend", cleanup, { once: true });
    setTimeout(cleanup, 650);
  }

  function weightedPool(){
    const unlocked = ingredients.filter(i => i.unlock <= state.level);
    const bag = [];
    unlocked.forEach(i => {
      for(let n = 0; n < RARITY[i.rarity].weight; n++) bag.push(i);
    });
    return bag;
  }
  function randomIngredient(){
    const pool = weightedPool();
    return pool[Math.floor(Math.random()*pool.length)];
  }
  function stageName(age, ball){
    const perfectWindow = ball ? ball.perfectWindow : 1;
    const burntAt = STAGE_READY_MAX + (STAGE_PERFECT_MAX - STAGE_READY_MAX) * perfectWindow;
    if(age < STAGE_RAW_MAX) return ["raw","まだ生"];
    if(age < STAGE_READY_MAX) return ["ready","こんがり"];
    if(age < burntAt) return ["perfect","完璧"];
    return ["burnt","焦げ"];
  }
  const holeEls = createHoles().map((_, i) => {
    const btn = document.createElement("button");
    btn.className = "hole";
    btn.dataset.state = "";
    btn.addEventListener("click", () => tapHole(i));
    return btn;
  });
  griddle.append(...holeEls);
  function updateHole(h, i){
    const btn = holeEls[i];
    if(!btn) return;
    btn.setAttribute("aria-label", (h.ball ? h.ball.name + "入りたこ焼き" : "空の穴") + " " + (i + 1));
    const prevKey = btn.dataset.state;
    const key = h.ball ? h.ball.name + ":" + stageName(h.age, h.ball)[0] : "empty";
    if(prevKey === key) return;
    btn.dataset.state = key;
    if(!h.ball){
      btn.replaceChildren();
      return;
    }
    const [cls, label] = stageName(h.age, h.ball);
    const className = "ball " + cls + " " + RARITY[h.ball.rarity].badgeCls;
    const html = `<span><span class="emoji">${h.ball.emoji}</span><span class="name">${h.ball.name}<br>${label}</span></span>`;
    const isNewBall = prevKey === "empty" || prevKey === "";
    const existingBall = !isNewBall && btn.querySelector(".ball");
    if(existingBall){
      // 生地投入時だけポップ演出、焼き加減の遷移は要素を作り直さずなだらかに更新する
      existingBall.className = className;
      existingBall.innerHTML = html;
    }else{
      const ball = document.createElement("div");
      ball.className = className;
      ball.innerHTML = html;
      btn.replaceChildren(ball);
    }
  }
  function render(){
    const heatLevel = currentHeatLevel();
    $("level").textContent = state.level;
    animateScoreTo(state.score);
    $("coins").textContent = state.coins;
    $("timer").textContent = state.time;
    $("heatLabel").textContent = "火力：" + heatLevel.label;
    $("heatBar").style.width = heatLevel.barWidth + "%";
    $("boostBtn").textContent = state.heat === HEAT_LEVELS[HEAT_LEVELS.length - 1].value ? "火力を戻す" : "火力UP";
    $("queue").textContent = "解放具材：" + ingredients.filter(i=>i.unlock<=state.level).length + "種";
    state.holes.forEach((h, i) => updateHole(h, i));
    renderCollection();
  }
  function renderCollection(){
    const found = ingredients.filter(i => state.seen.has(i.name));
    $("collection").innerHTML = found.length ? found.map(i => {
      return `<div class="ingredient"><span>${i.emoji}</span><strong>${i.name}</strong><span class="rarity ${RARITY[i.rarity].badgeCls}">${RARITY[i.rarity].label}</span></div>`;
    }).join("") : `<div class="guide">まだ未発見。まずは焼いてみよう。</div>`;
  }
  function renderDex(){
    const discoveredCount = ingredients.filter(i => ui.dex[i.name]).length;
    $("dexProgress").textContent = `${discoveredCount}/${ingredients.length}`;
    $("dexList").innerHTML = ingredients.map(i => {
      const entry = ui.dex[i.name];
      if(!entry){
        return `<div class="ingredient undiscovered"><span>❓</span><strong>？？？</strong><span class="dex-count"></span><span class="rarity unknown">？</span></div>`;
      }
      const newBadge = ui.newDiscoveries.has(i.name) ? `<span class="new-flag">NEW</span>` : "";
      return `<div class="ingredient"><span>${i.emoji}</span><strong>${i.name}${newBadge}</strong><span class="dex-count">×${entry.collected}</span><span class="rarity ${RARITY[i.rarity].badgeCls}">${RARITY[i.rarity].label}</span></div>`;
    }).join("");
  }
  function setMessage(text){ $("message").innerHTML = text; }

  function loadHighScores(){
    try{
      const list = JSON.parse(localStorage.getItem(HIGHSCORE_KEY) || "[]");
      return Array.isArray(list) ? list : [];
    }catch(e){ return []; }
  }
  const jstFormatter = new Intl.DateTimeFormat("ja-JP", {
    timeZone: "Asia/Tokyo",
    month: "numeric", day: "numeric",
    hour: "2-digit", minute: "2-digit", hourCycle: "h23"
  });
  function formatDate(iso){
    const d = new Date(iso);
    if(Number.isNaN(d.getTime())) return "";
    const p = {};
    jstFormatter.formatToParts(d).forEach(part => { p[part.type] = part.value; });
    return `${p.month}/${p.day} ${p.hour}:${p.minute}`;
  }
  function renderRanking(justAdded){
    const list = loadHighScores();
    const rankingEl = $("ranking");
    if(!list.length){
      rankingEl.innerHTML = `<li class="ranking-empty">まだ記録がありません。プレイしてスコアを残そう！</li>`;
      return;
    }
    rankingEl.innerHTML = list.map((entry, i) => {
      const badgeCls = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";
      const isNew = justAdded && entry.date === justAdded.date;
      return `<li class="${isNew ? "new" : ""}">
        <span class="rank-badge ${badgeCls}">${i + 1}</span>
        <span class="score">${entry.score}点<span class="meta">発見${entry.discovered}種・${formatDate(entry.date)}</span></span>
      </li>`;
    }).join("");
  }
  function recordScore(score, discovered){
    const list = loadHighScores();
    const entry = { score, discovered, date: new Date().toISOString() };
    list.push(entry);
    list.sort((a, b) => b.score - a.score);
    const top10 = list.slice(0, 10);
    try{ localStorage.setItem(HIGHSCORE_KEY, JSON.stringify(top10)); }catch(e){}
    renderRanking(entry);
    const rank = top10.indexOf(entry);
    return rank >= 0 ? rank + 1 : null;
  }
  function findRarestSeen(seenSet){
    let best = null;
    seenSet.forEach(name => {
      const ing = ingredients.find(i => i.name === name);
      if(ing && (!best || RARITY[ing.rarity].rank > RARITY[best.rarity].rank)) best = ing;
    });
    return best;
  }
  async function shareResult(){
    if(!state.lastResult){
      setMessage("まずは1回プレイしてから結果をシェアしよう！");
      return "none";
    }
    const { score, discovered, level, rank, rarest } = state.lastResult;
    const rankLine = rank ? `ランキング${rank}位！` : "";
    const rareLine = rarest && rarest.rarity !== "normal"
      ? `\n最高レア具材: ${rarest.emoji}${rarest.name}(${RARITY[rarest.rarity].label})`
      : "";
    const url = location.href.split("#")[0].split("?")[0];
    const text = `🐙たこ焼き具材ガチャで${score}点！\n発見具材${discovered}種・レベル${level}${rankLine ? "・" + rankLine : ""}${rareLine}\n${url}`;
    const isMobile = window.matchMedia("(max-width:820px)").matches;
    if(navigator.share && isMobile){
      // urlを別項目にすると共有先アプリがurlしか使わずtextを無視することがあるため、textにまとめて渡す
      try{ await navigator.share({ title: "たこ焼き具材ガチャ", text }); return "shared"; }
      catch(e){ return "cancelled"; /* ユーザーがキャンセルした場合など */ }
    }
    try{
      await navigator.clipboard.writeText(text);
      setMessage("結果をクリップボードにコピーしました！SNSなどに貼り付けてシェアしよう。");
      return "copied";
    }catch(e){
      setMessage("コピーに失敗しました。お使いのブラウザは共有に対応していないかもしれません。");
      return "failed";
    }
  }
  function levelCheck(){
    const next = Math.floor(state.score / LEVEL_SCORE_STEP) + 1;
    if(next > state.level){
      state.level = next;
      setMessage(`レベル${state.level}にアップ！ 新しい具材が屋台に届きました。`);
    }
  }
  function vibrate(pattern){
    if(navigator.vibrate){
      try{ navigator.vibrate(pattern); }catch(e){}
    }
  }
  function hideStageBanner(){
    clearTimeout(ui.bannerTimer);
    const el = $("stageBanner");
    el.classList.remove("show");
    el.innerHTML = "";
  }
  function showStageBanner(html, autoHideMs){
    const el = $("stageBanner");
    clearTimeout(ui.bannerTimer);
    el.innerHTML = html;
    el.classList.add("show");
    if(autoHideMs){
      ui.bannerTimer = setTimeout(hideStageBanner, autoHideMs);
    }
  }
  function tapHole(index){
    if(!state.running) return setMessage("まずはスタートを押してね。");
    const h = state.holes[index];
    if(!h.ball){
      h.ball = randomIngredient(); h.age = 0; h.flipped = false;
      setMessage(`${h.ball.emoji} ${h.ball.name}入りを投入！`);
      state.seen.add(h.ball.name);
      recordDiscovery(h.ball);
      vibrate(10);
    } else if(!h.flipped){
      h.flipped = true; h.age = Math.max(2.1, h.age);
      setMessage("くるっと回転！いい香りがしてきた。");
      vibrate(10);
    } else {
      const [cls, label] = stageName(h.age, h.ball);
      const rarity = h.ball.rarity;
      const emoji = h.ball.emoji;
      const name = h.ball.name;
      let gained = 0;
      if(cls === "ready"){ gained = h.ball.points; state.combo = 0; }
      if(cls === "perfect"){ state.combo += 1; gained = Math.round(h.ball.points * (1.6 + state.combo * .12)); }
      if(cls === "raw"){ gained = RAW_PENALTY; state.combo = 0; }
      if(cls === "burnt"){ gained = BURNT_PENALTY; state.combo = 0; }
      state.score = Math.max(0, state.score + gained);
      state.coins = Math.max(0, state.coins + Math.max(0, Math.floor(gained/5)));
      const isSpecial = cls === "perfect" || rarity !== "normal";
      if(gained > 0){
        const rareText = rarity !== "normal" ? ` ${RARITY[rarity].label}具材ボーナス！` : "";
        const comboText = state.combo > 1 ? ` <span class="combo">${state.combo}連続完璧！</span>` : "";
        setMessage(`${emoji} ${name}を${label}で提供！ +${gained}点${rareText}${comboText}`);
        vibrate(cls === "perfect" ? (state.combo > 1 ? [15, 40, 15, 40, 30] : [10, 50, 20]) : 15);
      } else {
        setMessage(cls === "raw" ? `まだ早かった… ${gained}点` : `焦げちゃった… ${gained}点`);
        vibrate([30, 30, 30]);
      }
      showFloatScore(index, gained, rarity, state.combo);
      if(gained > 0){
        recordCollected(name);
        if(isSpecial) spawnParticles(index, rarity !== "normal" ? 9 : 6, "spark");
        flyToTray(index, emoji);
      }else{
        spawnParticles(index, 4, "smoke");
      }
      if(state.combo > 1) flashMachine("combo-flash");
      holeEls[index].classList.remove("warn");
      h.ball = null; h.age = 0; h.flipped = false;
      levelCheck();
    }
    render();
  }
  function endGame(){
    state.running = false;
    clearInterval(state.tick);
    const discovered = state.seen.size;
    const rank = recordScore(state.score, discovered);
    const rarest = findRarestSeen(state.seen);
    state.lastResult = { score: state.score, discovered, level: state.level, rank, rarest, date: new Date().toISOString() };
    const rankText = rank ? ` ランキング${rank}位にランクイン！` : "";
    setMessage(`閉店！ スコア${state.score}点、発見具材${discovered}種。${rankText}もう一回で伝説具材を狙おう！`);
    const foundIngredients = ingredients.filter(i => state.seen.has(i.name));
    const chipsHtml = foundIngredients.map((ing, idx) => {
      const isStar = rarest && ing.name === rarest.name;
      return `<span class="chip${isStar ? " star" : ""}" style="animation-delay:${idx * 70}ms">${ing.emoji}</span>`;
    }).join("");
    showStageBanner(`
      <div class="title">閉店！</div>
      <div class="result-score">${state.score}点</div>
      <div class="sub">発見具材${discovered}種・レベル${state.level}${rankText}</div>
      ${chipsHtml ? `<div class="chips">${chipsHtml}</div>` : ""}
      <button class="banner-share" id="bannerShareBtn">結果をシェア</button>
    `);
    const bannerShareBtn = $("bannerShareBtn");
    if(bannerShareBtn){
      bannerShareBtn.addEventListener("click", async (e) => {
        e.stopPropagation();
        const result = await shareResult();
        const feedback = { copied: "コピーしました！", shared: "共有しました！", failed: "コピーに失敗しました" }[result];
        if(feedback && bannerShareBtn.isConnected){
          bannerShareBtn.textContent = feedback;
          setTimeout(() => {
            if(bannerShareBtn.isConnected) bannerShareBtn.textContent = "結果をシェア";
          }, 2000);
        }
      });
    }
    celebrateNewFinds(state.newFinds);
  }
  function tick(){
    if(!state.running) return;
    state.time -= 1;
    state.holes.forEach((h, i) => {
      if(!h.ball){
        holeEls[i].classList.remove("warn");
        return;
      }
      h.age += cookRate(h.ball, state.heat);
      if(h.age >= NEGLECT_AGE){
        state.score = Math.max(0, state.score - NEGLECT_PENALTY);
        state.combo = 0;
        showFloatScore(i, -NEGLECT_PENALTY, null, 0);
        spawnParticles(i, 10, "ash");
        flashMachine("danger-flash");
        vibrate([40, 40, 40, 40]);
        setMessage(`${h.ball.emoji} ${h.ball.name}が放置されすぎて炭になった…-${NEGLECT_PENALTY}点`);
        h.ball = null; h.age = 0; h.flipped = false;
        holeEls[i].classList.remove("warn");
      }else{
        holeEls[i].classList.toggle("warn", h.age >= NEGLECT_WARN_AGE);
      }
    });
    if(state.time <= 0){
      endGame();
    }
    render();
  }
  function start(){
    clearInterval(state.tick);
    Object.assign(state,{running:true, level:1, score:0, coins:0, time:60, heat:HEAT_LEVELS[0].value, combo:0});
    state.holes = createHoles();
    state.seen = new Set();
    state.newFinds = [];
    ui.discoveryQueue = [];
    $("discoveryOverlay").hidden = true;
    ui.scoreAnimCurrent = 0;
    $("score").textContent = 0;
    resetTray();
    holeEls.forEach(el => el.classList.remove("warn"));
    setMessage("開店！空いている穴をクリックして生地を流そう。");
    showStageBanner(`<div class="title">開店！</div><div class="sub">生地を流して焼いていこう</div>`, 1100);
    state.tick = setInterval(tick, 1000);
    render();
  }
  $("startBtn").addEventListener("click", () => {
    if(state.running && !ui.restartArmed){
      ui.restartArmed = true;
      setMessage("プレイ中です。やり直す場合はもう一度「スタート」を押してね。");
      clearTimeout(ui.restartArmTimer);
      ui.restartArmTimer = setTimeout(() => { ui.restartArmed = false; }, 3000);
      return;
    }
    ui.restartArmed = false;
    clearTimeout(ui.restartArmTimer);
    start();
  });
  $("boostBtn").addEventListener("click", () => {
    if(!state.running) return setMessage("開店してから火力を上げられるよ。");
    const idx = HEAT_LEVELS.findIndex(h => h.value === state.heat);
    const next = HEAT_LEVELS[(idx + 1) % HEAT_LEVELS.length];
    state.heat = next.value;
    setMessage(state.heat === HEAT_LEVELS[0].value ? "火力をふつうに戻した。" : "火力アップ！焦げやすいので急いで回収。");
    render();
  });
  $("discoveryOverlay").addEventListener("click", showNextDiscovery);
  $("dexBtn").addEventListener("click", () => {
    renderDex();
    $("dexModal").hidden = false;
  });
  $("dexClose").addEventListener("click", () => { $("dexModal").hidden = true; });
  $("dexModal").addEventListener("click", (e) => {
    if(e.target === $("dexModal")) $("dexModal").hidden = true;
  });
  document.addEventListener("keydown", (e) => {
    if(e.key === "Escape") $("dexModal").hidden = true;
  });
  state.holes = createHoles();
  render();
  renderRanking();

  if("serviceWorker" in navigator){
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").then(reg => {
        reg.update();
      }).catch(() => {});
    });
    let reloadedForUpdate = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if(reloadedForUpdate) return;
      reloadedForUpdate = true;
      window.location.reload();
    });
  }
})();
</script>
</body>
</html>
